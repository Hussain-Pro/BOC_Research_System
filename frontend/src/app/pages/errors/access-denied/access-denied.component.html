<boc-auth-shell title="403" subtitle="عفواً، لا تملك الصلاحية!" [showVisual]="false" maxWidth="520px">
  <div class="text-center py-3">
    <div class="error-icon mb-4">
      <i class="bi bi-shield-lock display-1 text-danger opacity-75"></i>
    </div>
    <p class="text-muted lead mb-4">
      ليس لديك إذن للوصول إلى هذه الصفحة.<br>
      إذا كنت تعتقد أن هذا خطأ، يرجى التواصل مع مسؤول النظام.
    </p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a routerLink="/home" class="btn btn-primary-industrial px-4">لوحة التحكم</a>
      <a routerLink="/landing" class="btn btn-outline-secondary rounded-pill px-4">الرئيسية</a>
    </div>
  </div>
</boc-auth-shell>
