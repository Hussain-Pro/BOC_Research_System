<boc-auth-shell title="404" subtitle="الصفحة غير موجودة" [showVisual]="false" maxWidth="520px">
  <div class="text-center py-3">
    <div class="error-icon mb-4">
      <i class="bi bi-compass display-1 text-secondary opacity-50"></i>
    </div>
    <p class="text-muted lead mb-4">
      عفواً، لم نتمكن من العثور على الصفحة التي تبحث عنها.<br>
      قد يكون الرابط معطلاً أو تم نقل الصفحة.
    </p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a routerLink="/landing" class="btn btn-primary-industrial px-4">العودة للرئيسية</a>
      <a routerLink="/auth/login" class="btn btn-outline-secondary rounded-pill px-4">تسجيل الدخول</a>
    </div>
  </div>
</boc-auth-shell>
