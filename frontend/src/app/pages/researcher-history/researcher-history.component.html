<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container-lg">

    <boc-page-hero
      title="تاريخ الأبحاث الشخصي"
      subtitle="سجل بجميع الأبحاث التي قمت بتقديمها ونتائج التقييم النهائية.">
      <a heroActions routerLink="/research/submit" class="btn btn-primary-industrial">
        <i class="bi bi-plus-circle me-2"></i> تقديم بحث جديد
      </a>
    </boc-page-hero>

    <boc-empty-state
      *ngIf="historyRecords.length === 0"
      icon="bi-journal-x"
      title="لا توجد أبحاث مقدمة"
      message="لم تقم بتقديم أي بحث بعد. ابدأ بتقديم بحثك الأول الآن."
      actionLabel="تقديم بحث جديد"
      actionRoute="/research/submit">
    </boc-empty-state>

    <boc-data-table
      *ngIf="historyRecords.length > 0"
      [columns]="tableColumns"
      [columnLabels]="columnLabels"
      [data]="historyRecords"
      [pageSize]="10">

      <ng-template bocTableCellDef="title" let-row>
        <div class="title-cell" [title]="$any(row).title">{{ $any(row).title }}</div>
      </ng-template>

      <ng-template bocTableCellDef="category" let-row>
        <span class="badge bg-light text-dark border">{{ $any(row).category }}</span>
      </ng-template>

      <ng-template bocTableCellDef="submittedAt" let-row>
        {{ $any(row).submittedAt | date:'yyyy/MM/dd' }}
      </ng-template>

      <ng-template bocTableCellDef="status" let-row>
        <boc-status-chip [status]="getStatusChip($any(row).status).type">
          {{ getStatusChip($any(row).status).label }}
        </boc-status-chip>
      </ng-template>

      <ng-template bocTableCellDef="score" let-row>
        <span class="fw-bold"
              [class.text-success]="$any(row).score !== null && $any(row).score >= 60"
              [class.text-danger]="$any(row).score !== null && $any(row).score < 60"
              [class.text-muted]="$any(row).score === null">
          {{ $any(row).score !== null ? $any(row).score + '%' : '--' }}
        </span>
      </ng-template>

      <ng-template bocTableCellDef="actions" let-row>
        <a *ngIf="$any(row).status === 'Non_Compliant_Returned'"
           [routerLink]="['/research/corrections', $any(row).id]"
           class="btn btn-sm btn-outline-warning"
           title="رفع التعديلات">
          <i class="bi bi-pencil-square"></i> تعديل
        </a>
        <a *ngIf="$any(row).status !== 'Non_Compliant_Returned'"
           [routerLink]="['/research/timeline']"
           [queryParams]="{ id: $any(row).id }"
           class="btn btn-sm btn-outline-primary"
           title="عرض المسار">
          <i class="bi bi-eye"></i>
        </a>
      </ng-template>

    </boc-data-table>

  </div>
</div>
