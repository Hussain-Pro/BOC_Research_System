<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero title="مركز الإشعارات" subtitle="تابع آخر التحديثات والتنبيهات"
                   [breadcrumbs]="[{label: 'الرئيسية', route: '/home'}, {label: 'الإشعارات'}]">
      <button heroActions type="button" class="btn btn-outline-secondary btn-sm rounded-pill" (click)="markAllAsRead()">
        تحديد الكل كمقروء
      </button>
    </boc-page-hero>

    <boc-glass-card [noPadding]="true">
      <boc-empty-state *ngIf="notifications.length === 0" icon="bi-bell-slash"
                       title="لا توجد إشعارات جديدة" message="ستظهر التنبيهات هنا عند وصولها.">
      </boc-empty-state>

      <div class="list-group list-group-flush" *ngIf="notifications.length">
        <div *ngFor="let notif of notifications"
             class="list-group-item list-group-item-action p-4 d-flex gap-3 align-items-start notification-item"
             [class.unread]="!notif.isRead">
          <div class="notif-icon flex-shrink-0" [ngClass]="getIconClass(notif.type)">
            <i class="bi" [ngClass]="getIcon(notif.type)"></i>
          </div>
          <div class="flex-grow-1">
            <div class="d-flex justify-content-between mb-1">
              <h6 class="fw-bold mb-0" [class.text-primary]="!notif.isRead">{{ notif.title }}</h6>
              <small class="text-muted">{{ notif.timestamp | date:'shortTime' }}</small>
            </div>
            <p class="mb-2 text-secondary small">{{ notif.message }}</p>
            <a *ngIf="notif.actionUrl" class="btn btn-sm btn-primary-industrial" [routerLink]="notif.actionUrl">عرض التفاصيل</a>
          </div>
          <span *ngIf="!notif.isRead" class="badge bg-danger rounded-circle p-2 align-self-start"></span>
        </div>
      </div>
    </boc-glass-card>
  </div>
</div>
