<div class="anim-fade-in-up" id="chat-page">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1 class="text-h1">المحادثة الفورية</h1>
      <p class="text-label">تواصل مع أعضاء اللجنة والمسؤولين عبر قناة SignalR المؤمنة</p>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card p-0 h-100" style="display:flex;flex-direction:column;min-height:600px;max-height:800px">
        
        <!-- Chat Header -->
        <div class="card-header" style="background:var(--boc-bg);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:16px;padding:20px">
          <div class="avatar" style="width:48px;height:48px;background:var(--boc-primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold">
            {{ currentRoom[0] }}
          </div>
          <div>
            <h5 class="mb-1 text-body-strong">{{ currentRoom }}</h5>
            <small style="color:var(--boc-success);font-weight:bold;display:flex;align-items:center;gap:6px">
              <span class="live-dot" style="position:static;width:8px;height:8px;display:inline-block"></span> متصل (SignalR)
            </small>
          </div>
        </div>

        <!-- Chat Body -->
        <div class="card-body" #scrollMe [scrollTop]="scrollMe.scrollHeight" style="flex:1;overflow-y:auto;background:rgba(15,42,56,0.02);padding:24px">
          
          <div *ngIf="messages.length === 0" class="empty-state" style="margin:auto;margin-top:60px">
            <div class="empty-icon"><i class="bi bi-chat-dots"></i></div>
            <h3>لا توجد رسائل</h3>
            <p>ابدأ المحادثة بإرسال رسالة جديدة.</p>
          </div>

          <div *ngFor="let msg of messages" style="margin-bottom:16px;display:flex;flex-direction:column" [style.alignItems]="msg.isMine ? 'flex-start' : 'flex-end'">
            <div style="max-width:70%;padding:12px 16px;border-radius:var(--radius-md);box-shadow:var(--shadow-sm)"
                 [style.background]="msg.isMine ? 'var(--boc-primary)' : '#fff'"
                 [style.color]="msg.isMine ? '#fff' : 'var(--text-body)'"
                 [style.border]="msg.isMine ? 'none' : '1px solid var(--border-color)'">
              
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:16px">
                <small style="font-weight:bold;font-size:12px" [style.color]="msg.isMine ? 'rgba(255,255,255,0.8)' : 'var(--boc-primary)'">
                  {{ msg.sender }}
                </small>
                <small style="font-size:11px" [style.color]="msg.isMine ? 'rgba(255,255,255,0.6)' : 'var(--text-muted)'">
                  {{ msg.timestamp | date:'HH:mm' }}
                </small>
              </div>
              <p class="mb-0" style="font-size:15px;line-height:1.5">{{ msg.content }}</p>
            </div>
          </div>
        </div>

        <!-- Chat Footer -->
        <div class="card-footer" style="padding:20px;border-top:1px solid var(--border-color);background:#fff">
          <form (ngSubmit)="sendMessage()" style="display:flex;gap:12px">
            <button type="button" class="btn btn-secondary" style="padding:0 20px;color:var(--text-muted)"><i class="bi bi-paperclip"></i></button>
            <input type="text" class="form-input" style="flex:1" placeholder="اكتب رسالتك هنا..." [(ngModel)]="newMessage" name="message" autocomplete="off" required>
            <button type="submit" class="btn btn-primary" [disabled]="!newMessage.trim()" style="padding:0 30px">
              إرسال <i class="bi bi-send ms-2"></i>
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>
