<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container chat-page">
    <boc-page-hero
      title="المحادثة الفورية"
      subtitle="تواصل مع أعضاء اللجنة والمسؤولين عبر قناة SignalR المؤمنة."
      [breadcrumbs]="breadcrumbs">
    </boc-page-hero>

    <boc-glass-card [noPadding]="true" extraClass="chat-card">
      <div class="chat-header">
        <div class="d-flex align-items-center gap-3">
          <div class="room-avatar">{{ currentRoom[0] }}</div>
          <div>
            <h5 class="mb-0 fw-bold">{{ currentRoom }}</h5>
            <small class="text-success"><i class="bi bi-circle-fill live-indicator"></i> متصل (SignalR)</small>
          </div>
        </div>
      </div>

      <div class="chat-body" #scrollMe [scrollTop]="scrollMe.scrollHeight">
        <boc-empty-state
          *ngIf="messages.length === 0"
          icon="bi-chat-dots"
          title="لا توجد رسائل"
          message="ابدأ المحادثة بإرسال رسالة جديدة.">
        </boc-empty-state>

        <div *ngFor="let msg of messages" class="message-row" [class.mine]="msg.isMine">
          <div class="message-bubble glass-card">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <small class="fw-bold" [class.text-primary]="msg.isMine">{{ msg.sender }}</small>
              <small class="text-muted timestamp">{{ msg.timestamp | date:'HH:mm' }}</small>
            </div>
            <p class="mb-0">{{ msg.content }}</p>
          </div>
        </div>
      </div>

      <div class="chat-footer">
        <form (ngSubmit)="sendMessage()" class="d-flex gap-2">
          <button type="button" class="btn btn-light border"><i class="bi bi-paperclip"></i></button>
          <input type="text" class="form-control" placeholder="اكتب رسالتك هنا..." [(ngModel)]="newMessage" name="message" autocomplete="off" required>
          <button type="submit" class="btn btn-primary-industrial px-4" [disabled]="!newMessage.trim()">
            إرسال <i class="bi bi-send ms-2"></i>
          </button>
        </form>
      </div>
    </boc-glass-card>
  </div>
</div>
