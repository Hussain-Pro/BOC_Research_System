<boc-auth-shell title="إنشاء حساب جديد" subtitle="انضم إلى مجتمع الباحثين في شركة نفط البصرة" maxWidth="500px">
  <div *ngIf="errorMessage" class="alert alert-danger shadow-sm border-0 rounded-3 mb-4" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-md-6">
        <boc-form-field label="الاسم الأول" icon="bi-person" placeholder="أحمد" formControlName="firstName"></boc-form-field>
      </div>
      <div class="col-md-6">
        <boc-form-field label="اسم العائلة" icon="bi-person" placeholder="العراقي" formControlName="lastName"></boc-form-field>
      </div>
    </div>

    <boc-form-field label="البريد الإلكتروني المؤسسي" type="email" icon="bi-envelope"
                    placeholder="name@boc.iq" dir="ltr" formControlName="email"></boc-form-field>

    <boc-form-field label="كلمة المرور" type="password" icon="bi-shield-lock"
                    placeholder="••••••••" dir="ltr" formControlName="password"></boc-form-field>

    <boc-form-field label="الرقم الوطني" icon="bi-card-text" placeholder="XXXXXXXXXX"
                    dir="ltr" formControlName="nationalID"></boc-form-field>

    <boc-form-field label="تاريخ الميلاد" type="date" icon="bi-calendar"
                    dir="ltr" formControlName="birthDate"></boc-form-field>

    <button type="submit" class="btn btn-primary-industrial btn-lg w-100 mt-2 mb-4"
            [disabled]="registerForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
      إنشاء الحساب
    </button>

    <div class="text-center text-muted small">
      لديك حساب بالفعل؟
      <a routerLink="/auth/login" class="text-primary fw-bold text-decoration-none">تسجيل الدخول</a>
    </div>
  </form>
</boc-auth-shell>
