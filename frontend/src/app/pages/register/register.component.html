<boc-auth-shell
  title="إنشاء حساب جديد"
  subtitle="انضم إلى مجتمع الباحثين في شركة نفط البصرة"
  maxWidth="480px">

  <!-- Error Alert -->
  <div *ngIf="errorMessage" class="auth-alert auth-alert-error" role="alert">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span>{{ errorMessage }}</span>
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>

    <!-- Name row -->
    <div class="auth-form-grid">
      <boc-form-field
        label="الاسم الأول"
        icon="bi-person"
        placeholder="أحمد"
        formControlName="firstName"
        [required]="true">
      </boc-form-field>
      <boc-form-field
        label="اسم العائلة"
        icon="bi-person"
        placeholder="الخالدي"
        formControlName="lastName"
        [required]="true">
      </boc-form-field>
    </div>

    <boc-form-field
      label="البريد الإلكتروني المؤسسي"
      type="email"
      icon="bi-envelope"
      placeholder="name@boc.iq"
      dir="ltr"
      formControlName="email"
      [required]="true">
    </boc-form-field>

    <boc-form-field
      label="كلمة المرور"
      type="password"
      icon="bi-shield-lock"
      placeholder="••••••••"
      dir="ltr"
      formControlName="password"
      [required]="true">
    </boc-form-field>

    <boc-form-field
      label="الرقم الوطني"
      icon="bi-card-text"
      placeholder="XXXXXXXXXX"
      dir="ltr"
      formControlName="nationalID"
      [required]="true">
    </boc-form-field>

    <boc-form-field
      label="تاريخ الميلاد"
      type="date"
      icon="bi-calendar"
      dir="ltr"
      formControlName="birthDate"
      [required]="true">
    </boc-form-field>

    <button
      type="submit"
      class="btn btn-primary btn-lg w-100 mt-2"
      id="register-submit-btn"
      [disabled]="registerForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner"></span>
      <i *ngIf="!isLoading" class="bi bi-person-check"></i>
      {{ isLoading ? 'جارٍ إنشاء الحساب...' : 'إنشاء الحساب' }}
    </button>

    <div class="auth-divider">
      <span>لديك حساب بالفعل؟</span>
    </div>

    <a routerLink="/auth/login" class="btn btn-secondary btn-lg w-100" id="back-to-login">
      <i class="bi bi-box-arrow-in-left"></i>
      تسجيل الدخول
    </a>

  </form>
</boc-auth-shell>
