<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light py-5" dir="rtl">
  <div class="row w-100 justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card-industrial p-4">
        <h3 class="mb-4 text-center" style="color: var(--boc-primary); font-weight: 700;">
          إنشاء حساب جديد
        </h3>
        
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="fullName" class="form-label">الاسم الكامل</label>
              <input type="text" class="form-control" id="fullName" formControlName="fullName" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="email" class="form-label">البريد الإلكتروني</label>
              <input type="email" class="form-control" id="email" formControlName="email" required dir="ltr">
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="employeeID" class="form-label">الرقم الوظيفي</label>
              <input type="text" class="form-control" id="employeeID" formControlName="employeeID" required dir="ltr">
            </div>
            <div class="col-md-6 mb-3">
              <label for="nationalID" class="form-label">الرقم الوطني</label>
              <input type="text" class="form-control" id="nationalID" formControlName="nationalID" required dir="ltr">
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="birthDate" class="form-label">تاريخ الميلاد</label>
              <input type="date" class="form-control" id="birthDate" formControlName="birthDate" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="roleId" class="form-label">نوع الحساب</label>
              <select class="form-select" id="roleId" formControlName="roleId" required>
                <option value="A7BE60BA-B82D-471F-B521-D89D98BC304C">باحث (Researcher)</option>
                <option value="7713F124-36C9-41EA-8F89-EDDF79325A7F">مقيم خارجي (External Evaluator)</option>
              </select>
            </div>
          </div>
          
          <div class="mb-4">
            <label for="password" class="form-label">كلمة المرور</label>
            <input type="password" class="form-control" id="password" formControlName="password" required dir="ltr">
          </div>
          
          <button type="submit" class="btn btn-primary-industrial w-100 mb-3" [disabled]="registerForm.invalid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            تسجيل
          </button>
        </form>
        
        <div class="text-center mt-3">
          <a routerLink="/auth/login" class="text-decoration-none" style="color: var(--boc-secondary);">العودة لتسجيل الدخول</a>
        </div>
      </div>
    </div>
  </div>
</div>
