<div class="container-fluid min-vh-100 bg-light py-5" dir="rtl">
  <div class="row w-100 justify-content-center">
    <div class="col-lg-10">
      
      <!-- Header Card -->
      <div class="card-industrial p-4 mb-4 d-flex justify-content-between align-items-center">
        <div>
          <h2 class="mb-1" style="color: var(--boc-primary); font-weight: 700;">المخطط الزمني للبحث</h2>
          <p class="text-muted mb-0">بحث: {{ researchTitle }} (الرقم المرجعي: {{ referenceNumber }})</p>
        </div>
        <div>
          <span class="badge" 
                [ngClass]="{'bg-success': currentStatus === 'مكتمل', 'bg-warning text-dark': currentStatus !== 'مكتمل'}"
                style="font-size: 1.1rem; padding: 10px 20px;">
            الحالة: {{ currentStatus }}
          </span>
        </div>
      </div>

      <!-- Timeline Tracking -->
      <div class="card-industrial p-4">
        <h4 class="mb-4" style="color: var(--boc-primary-light);">تتبع مسار التقييم</h4>
        
        <div class="timeline-wrapper position-relative px-3">
          <div *ngFor="let step of timelineSteps; let i = index" class="d-flex mb-4 position-relative">
            
            <!-- Timeline Line -->
            <div *ngIf="i !== timelineSteps.length - 1" 
                 class="position-absolute" 
                 style="left: auto; right: 19px; top: 40px; bottom: -24px; width: 2px; background-color: var(--boc-secondary); opacity: 0.3;">
            </div>

            <!-- Timeline Icon / Dot -->
            <div class="timeline-icon me-4 ms-3 d-flex justify-content-center align-items-center"
                 [ngStyle]="{'background-color': step.isCompleted ? 'var(--boc-success)' : (step.isActive ? 'var(--boc-warning)' : 'var(--boc-secondary)')}"
                 style="width: 40px; height: 40px; border-radius: 50%; color: white; z-index: 1;">
              <i *ngIf="step.isCompleted" class="bi bi-check-lg" style="font-size: 1.5rem;">✔</i>
              <span *ngIf="!step.isCompleted">{{ i + 1 }}</span>
            </div>

            <!-- Timeline Content -->
            <div class="timeline-content w-100 p-3 rounded"
                 [ngStyle]="{'background-color': step.isActive ? 'rgba(255, 193, 7, 0.1)' : 'transparent', 'border': step.isActive ? '1px solid var(--boc-warning)' : 'none'}">
              <div class="d-flex justify-content-between">
                <h5 class="mb-1" [ngStyle]="{'color': step.isActive ? 'var(--boc-primary)' : 'var(--boc-secondary)'}">{{ step.title }}</h5>
                <small class="text-muted" *ngIf="step.date">{{ step.date | date:'yyyy/MM/dd HH:mm' }}</small>
              </div>
              <p class="mb-0 text-muted">{{ step.description }}</p>
              
              <!-- Additional Action Buttons if active -->
              <div *ngIf="step.isActive && step.requiresAction" class="mt-3">
                <button class="btn btn-sm btn-primary-industrial">تنفيذ الإجراء المطلوب</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</div>
