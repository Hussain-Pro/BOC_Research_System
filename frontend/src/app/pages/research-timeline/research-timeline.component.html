<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container-lg">

    <boc-page-hero
      [title]="'المخطط الزمني للبحث'"
      [subtitle]="'بحث: ' + researchTitle + ' (الرقم المرجعي: ' + referenceNumber + ')'">
      <div heroActions>
        <boc-status-chip status="review">الحالة: {{ currentStatus }}</boc-status-chip>
      </div>
    </boc-page-hero>

    <boc-glass-card title="تتبع مسار التقييم" subtitle="انقر على أي مرحلة لعرض التفاصيل">
      <boc-vertical-timeline [steps]="timelineSteps">
        <button timelineAction type="button" class="btn btn-sm btn-primary-industrial">
          تنفيذ الإجراء المطلوب
        </button>
      </boc-vertical-timeline>
    </boc-glass-card>

  </div>
</div>
