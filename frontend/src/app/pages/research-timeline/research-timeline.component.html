<div class="anim-fade-in-up" id="timeline-page">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1 class="text-h1">المخطط الزمني للبحث</h1>
      <p class="text-label">بحث: {{ researchTitle }} (الرقم المرجعي: {{ referenceNumber }})</p>
    </div>
    <div class="actions">
      <boc-status-chip status="review">الحالة: {{ currentStatus }}</boc-status-chip>
    </div>
  </div>

  <!-- Timeline Card -->
  <div class="card">
    <div class="card-header">
      <span class="text-h3">تتبع مسار التقييم</span>
      <span class="text-caption">يتم تحديث الحالة تلقائياً بعد كل مرحلة</span>
    </div>
    <div class="card-body">
      <boc-vertical-timeline [steps]="timelineSteps">
        <button timelineAction type="button" class="btn btn-sm btn-primary">
          تنفيذ الإجراء المطلوب
        </button>
      </boc-vertical-timeline>
    </div>
  </div>

</div>
