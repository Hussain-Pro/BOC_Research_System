<boc-auth-shell
  title="استعادة كلمة المرور"
  subtitle="أدخل بريدك الإلكتروني وسنرسل لك رابط الاستعادة">

  <!-- Success State -->
  <div *ngIf="isSuccess" class="auth-success-state">
    <div class="success-icon">
      <i class="bi bi-envelope-check-fill"></i>
    </div>
    <h3>تم إرسال الرابط بنجاح</h3>
    <p>تفقّد بريدك الإلكتروني وانقر على رابط الاستعادة خلال 15 دقيقة.</p>
    <a routerLink="/auth/login" class="btn btn-primary btn-md" id="back-to-login-btn">
      <i class="bi bi-arrow-right"></i>
      العودة لتسجيل الدخول
    </a>
  </div>

  <!-- Form -->
  <ng-container *ngIf="!isSuccess">
    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="auth-alert auth-alert-error" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" novalidate>

      <boc-form-field
        label="البريد الإلكتروني المؤسسي"
        type="email"
        icon="bi-envelope"
        placeholder="name@boc.iq"
        dir="ltr"
        formControlName="email"
        [required]="true">
      </boc-form-field>

      <button
        type="submit"
        class="btn btn-primary btn-lg w-100 mt-2"
        id="forgot-password-submit-btn"
        [disabled]="forgotPasswordForm.invalid || isLoading">
        <span *ngIf="isLoading" class="spinner"></span>
        <i *ngIf="!isLoading" class="bi bi-send"></i>
        {{ isLoading ? 'جارٍ الإرسال...' : 'إرسال رابط الاستعادة' }}
      </button>

      <div class="auth-divider"><span>أو</span></div>

      <a routerLink="/auth/login" class="btn btn-secondary btn-lg w-100" id="back-to-login">
        <i class="bi bi-arrow-right"></i>
        العودة لتسجيل الدخول
      </a>

    </form>
  </ng-container>

</boc-auth-shell>
