<boc-auth-shell title="استعادة كلمة المرور" subtitle="أدخل بريدك الإلكتروني المؤسسي لإرسال رابط الاستعادة">
  <div *ngIf="message" class="alert alert-success shadow-sm border-0 rounded-3 mb-4" role="status">
    <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
  </div>
  <div *ngIf="errorMessage" class="alert alert-danger shadow-sm border-0 rounded-3 mb-4" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
  </div>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
    <boc-form-field label="البريد الإلكتروني المؤسسي" type="email" icon="bi-envelope"
                    placeholder="name@boc.iq" dir="ltr" formControlName="email"></boc-form-field>

    <button type="submit" class="btn btn-primary-industrial btn-lg w-100 mt-3 mb-4"
            [disabled]="forgotPasswordForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
      إرسال رابط الاستعادة
    </button>

    <div class="text-center text-muted small">
      تذكرت كلمة المرور؟
      <a routerLink="/auth/login" class="text-primary fw-bold text-decoration-none">العودة لتسجيل الدخول</a>
    </div>
  </form>
</boc-auth-shell>
