<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light" dir="rtl">
  <div class="row w-100 justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card-industrial p-4 text-center">
        <h3 class="mb-4" style="color: var(--boc-primary); font-weight: 700;">
          استعادة كلمة المرور
        </h3>
        
        <div *ngIf="isSuccess" class="alert alert-success text-end small">
          تم إرسال تعليمات استعادة كلمة المرور إلى بريدك الإلكتروني بنجاح. يرجى التحقق من صندوق الوارد.
          <br><br>
          <a routerLink="/auth/reset-password" class="alert-link">لأغراض الاختبار: اذهب لصفحة إعادة التعيين</a>
        </div>

        <p class="text-muted small mb-4 text-end" *ngIf="!isSuccess">
          يرجى إدخال بريدك الإلكتروني المسجل لدينا، وسنقوم بإرسال رابط لإعادة تعيين كلمة المرور الخاصة بك.
        </p>
        
        <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" *ngIf="!isSuccess">
          <div class="mb-4 text-end">
            <label for="email" class="form-label">البريد الإلكتروني</label>
            <input type="email" class="form-control" 
                   id="email" [(ngModel)]="email" name="email" 
                   required email dir="ltr">
          </div>
          
          <button type="submit" class="btn btn-primary-industrial w-100 mb-3" [disabled]="!forgotForm.form.valid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            إرسال رابط الاستعادة
          </button>
        </form>
        
        <div class="mt-2 text-center">
          <a routerLink="/auth/login" class="text-decoration-none text-muted small">العودة لتسجيل الدخول</a>
        </div>
      </div>
    </div>
  </div>
</div>
