<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="جدولة اجتماع اللجنة"
      subtitle="إنشاء اجتماع جديد، بناء جدول الأعمال (Agenda)، وإرسال دعوات (RSVP) للأعضاء."
      [breadcrumbs]="breadcrumbs">
      <a heroActions routerLink="/committee/studio/1" class="btn btn-outline-primary btn-sm rounded-pill">
        <i class="bi bi-journal-text me-2"></i> الانتقال للاستوديو
      </a>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <boc-stat-card
          label="الأبحاث المتاحة"
          [value]="availableResearches.length"
          icon="bi-journals"
          iconBg="rgba(13, 110, 253, 0.12)"
          iconColor="var(--boc-accent-committee)">
        </boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card
          label="محدد في جدول الأعمال"
          [value]="selectedAgendaCount"
          icon="bi-check2-square"
          iconBg="rgba(40, 167, 69, 0.12)"
          iconColor="var(--boc-success)">
        </boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card
          label="تاريخ الاجتماع"
          [value]="meetingDate || '—'"
          icon="bi-calendar-event"
          iconBg="rgba(15, 42, 56, 0.1)"
          iconColor="var(--boc-primary)">
        </boc-stat-card>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-5">
        <boc-glass-card title="تفاصيل الاجتماع الأساسية">
          <div class="mb-4">
            <label class="form-label fw-bold">تاريخ الاجتماع <span class="text-danger">*</span></label>
            <input type="date" class="form-control form-control-lg" [(ngModel)]="meetingDate">
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">وقت الاجتماع <span class="text-danger">*</span></label>
            <input type="time" class="form-control form-control-lg" [(ngModel)]="meetingTime">
          </div>

          <div class="mb-0">
            <label class="form-label fw-bold">موقع الاجتماع / الرابط <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-lg" [(ngModel)]="meetingLocation" placeholder="مثال: قاعة الاجتماعات أو رابط Google Meet">
          </div>
        </boc-glass-card>
      </div>

      <div class="col-lg-7">
        <boc-glass-card
          title="بناء جدول الأعمال (Agenda)"
          subtitle="الأبحاث المكتملة التقييم والجاهزة للعرض على اللجنة."
          [noPadding]="true">
          <boc-empty-state
            *ngIf="availableResearches.length === 0"
            icon="bi-inbox"
            title="لا توجد أبحاث جاهزة"
            message="لا توجد أبحاث مكتملة التقييم حالياً.">
          </boc-empty-state>

          <div class="list-group list-group-flush" *ngIf="availableResearches.length">
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3 agenda-item" *ngFor="let research of availableResearches">
              <input class="form-check-input flex-shrink-0 fs-4" type="checkbox" [(ngModel)]="research.selected">
              <div class="d-flex gap-2 w-100 justify-content-between align-items-center">
                <div>
                  <h6 class="mb-1 fw-bold">{{ research.title }}</h6>
                  <p class="mb-0 text-muted small">رقم البحث: <span class="badge bg-secondary">{{ research.id }}</span></p>
                </div>
                <span class="badge bg-success bg-opacity-10 text-success border border-success">
                  <i class="bi bi-check-circle me-1"></i> جاهز للعرض
                </span>
              </div>
            </label>
          </div>

          <div class="p-4 border-top">
            <button type="button" class="btn btn-primary-industrial btn-lg w-100" [disabled]="isSubmitting" (click)="scheduleMeeting()">
              <span *ngIf="!isSubmitting"><i class="bi bi-calendar-plus me-2"></i> اعتماد الاجتماع وإرسال الدعوات</span>
              <span *ngIf="isSubmitting"><span class="spinner-border spinner-border-sm me-2"></span> جاري الإرسال...</span>
            </button>
          </div>
        </boc-glass-card>
      </div>
    </div>
  </div>
</div>
