<boc-auth-shell
  title="المصادقة الثنائية (2FA)"
  [subtitle]="requiresSetup ? 'الإعداد الأوّلي — امسح رمز QR بتطبيق المصادقة' : 'أدخل الرمز المكوّن من 6 أرقام من تطبيق المصادقة'"
  maxWidth="480px">

  <div *ngIf="requiresSetup" class="mb-4">
    <div class="tfa-info-box mb-3">
      <i class="bi bi-info-circle me-2"></i>
      <span class="small">
        امسح رمز QR باستخدام <strong>Google Authenticator</strong> أو <strong>Microsoft Authenticator</strong>،
        ثم أدخل الرمز المؤقت أدناه.
      </span>
    </div>

    <div class="row align-items-center g-3 mb-3">
      <div class="col-12 col-md-6 text-center">
        <div class="tfa-qr-box mx-auto">
          <img *ngIf="qrDataUrl" [src]="qrDataUrl" alt="رمز QR للمصادقة الثنائية" class="tfa-qr-img">
          <div *ngIf="!qrDataUrl" class="tfa-qr-spinner">
            <div class="spinner-border text-primary" role="status"></div>
            <div class="small text-muted mt-2">جاري التوليد...</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="tfa-secret-box" (click)="copySecret()" role="button" tabindex="0" (keydown.enter)="copySecret()">
          <div class="small text-muted mb-2"><i class="bi bi-clipboard me-1"></i>أو أدخل الرمز يدوياً</div>
          <code class="tfa-secret-code">{{ secret }}</code>
          <div class="tfa-copy-hint">انقر للنسخ</div>
        </div>
      </div>
    </div>
    <hr class="text-muted opacity-25">
  </div>

  <form [formGroup]="twoFactorForm" (ngSubmit)="onSubmit()">
    <boc-form-field label="رمز التحقق (OTP)" icon="bi-shield-lock"
                    placeholder="000000" dir="ltr" hint="6 أرقام"
                    formControlName="code"></boc-form-field>

    <button type="submit" class="btn btn-primary-industrial btn-lg w-100 mt-3 mb-3"
            [disabled]="twoFactorForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
      تأكيد المصادقة
    </button>

    <div class="text-center text-muted small">
      <a routerLink="/auth/login" class="text-primary fw-bold text-decoration-none">العودة لتسجيل الدخول</a>
    </div>
  </form>
</boc-auth-shell>
