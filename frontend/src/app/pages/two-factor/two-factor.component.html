<boc-auth-shell
  title="التحقق بخطوتين"
  subtitle="أدخل رمز التحقق من تطبيق المصادقة">

  <form [formGroup]="twoFactorForm" (ngSubmit)="onSubmit()" novalidate>

    <!-- Setup Mode: Show QR Code -->
    <ng-container *ngIf="requiresSetup">
      <div class="auth-alert" style="background:rgba(15,42,56,0.06);color:var(--text-secondary);border:1px solid var(--border-color);margin-bottom:16px;">
        <i class="bi bi-info-circle-fill" style="color:var(--boc-info)"></i>
        <span>المرة الأولى — امسح رمز QR بتطبيق المصادقة (Google Authenticator أو Authy)</span>
      </div>

      <div class="qr-container" *ngIf="qrDataUrl">
        <img [src]="qrDataUrl" alt="QR Code" width="180" height="180">
      </div>

      <div class="secret-key-row" *ngIf="secret">
        <span>{{ secret }}</span>
        <button type="button" class="icon-btn" (click)="copySecret()" title="نسخ الرمز" id="copy-secret-btn">
          <i class="bi bi-clipboard"></i>
        </button>
      </div>
    </ng-container>

    <!-- OTP Code input -->
    <div class="form-group">
      <label class="form-label">رمز التحقق المؤقت (6 أرقام)</label>
      <input
        type="text"
        class="form-input otp-input"
        placeholder="000000"
        maxlength="6"
        dir="ltr"
        id="otp-code-input"
        formControlName="code"
        autocomplete="one-time-code"
        inputmode="numeric"
      >
    </div>

    <button
      type="submit"
      class="btn btn-primary btn-lg w-100 mt-2"
      id="verify-2fa-btn"
      [disabled]="twoFactorForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner"></span>
      <i *ngIf="!isLoading" class="bi bi-shield-lock-fill"></i>
      {{ isLoading ? 'جارٍ التحقق...' : 'تأكيد الرمز' }}
    </button>

    <div class="auth-divider"><span>أو</span></div>

    <a routerLink="/auth/login" class="btn btn-secondary btn-lg w-100" id="back-to-login">
      <i class="bi bi-arrow-right"></i>
      العودة لتسجيل الدخول
    </a>

  </form>

</boc-auth-shell>
