<div class="container-fluid py-4 dashboard-bg min-vh-100" dir="rtl" id="home-dashboard">
  <div class="row mb-4 g-3">
    <div class="col-md-3"><boc-stat-card label="البحوث النشطة" value="12" icon="bi-journal-text" trend="+3 هذا الشهر" [trendUp]="true"></boc-stat-card></div>
    <div class="col-md-3"><boc-stat-card label="بانتظار المراجعة" value="5" icon="bi-hourglass-split" iconBg="rgba(255,193,7,0.15)" iconColor="#856404"></boc-stat-card></div>
    <div class="col-md-3"><boc-stat-card label="تم اعتمادها" value="28" icon="bi-check-circle" iconBg="rgba(40,167,69,0.12)" iconColor="var(--boc-success)" trend="+8%" [trendUp]="true"></boc-stat-card></div>
    <div class="col-md-3"><boc-stat-card label="إشعارات جديدة" value="3" icon="bi-bell" iconBg="rgba(220,53,69,0.12)" iconColor="var(--boc-danger)"></boc-stat-card></div>
  </div>

  <div class="row mb-4">
    <div class="col-12">
      <boc-glass-card>
        <div class="row align-items-center">
          <div class="col-lg-8">
            <span class="badge bg-primary bg-opacity-10 text-primary mb-2 px-3 py-2 rounded-pill fw-bold">مرحباً بك مجدداً</span>
            <h2 class="fw-bold mb-2 hero-title">نظام إدارة البحوث - شركة نفط البصرة</h2>
            <p class="text-muted fs-5 mb-3">
              أهلاً بك، <span class="fw-bold text-primary">{{ userName }}</span>
              <span class="badge bg-secondary ms-2" *ngIf="userRole">{{ userRole }}</span>
            </p>
            <div class="d-flex gap-2 flex-wrap">
              <a routerLink="/research/submit" class="btn btn-primary-industrial btn-sm"><i class="bi bi-file-earmark-plus me-1"></i>تقديم بحث</a>
              <a routerLink="/research/history" class="btn btn-outline-secondary btn-sm rounded-pill"><i class="bi bi-clock-history me-1"></i>متابعة</a>
              <a routerLink="/profile" class="btn btn-outline-secondary btn-sm rounded-pill"><i class="bi bi-person me-1"></i>الملف الشخصي</a>
              <button type="button" class="btn btn-outline-primary btn-sm rounded-pill" (click)="startTour()"><i class="bi bi-compass me-1"></i>ابدأ الجولة التعريفية</button>
            </div>
          </div>
          <div class="col-lg-4 text-start d-none d-lg-block">
            <img src="assets/boc_logo.png" alt="BOC Logo" height="100" class="opacity-75">
          </div>
        </div>
      </boc-glass-card>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-lg-8 mb-4">
      <boc-glass-card title="نشاط تقديم البحوث">
        <apx-chart
          [series]="$any(submissionsChartOptions['series'])"
          [chart]="$any(submissionsChartOptions['chart'])"
          [xaxis]="$any(submissionsChartOptions['xaxis'])"
          [dataLabels]="$any(submissionsChartOptions['dataLabels'])"
          [grid]="$any(submissionsChartOptions['grid'])"
          [stroke]="$any(submissionsChartOptions['stroke'])"
          [colors]="$any(submissionsChartOptions['colors'])">
        </apx-chart>
      </boc-glass-card>
    </div>
    <div class="col-lg-4 mb-4">
      <boc-glass-card title="إجراءات سريعة">
        <ng-container *ngFor="let action of visibleActions()">
          <a [routerLink]="action.route"
             class="btn w-100 mb-3 py-3 rounded-3 text-start d-flex align-items-center justify-content-between action-btn shadow-sm text-white"
             [class]="action.class || ''"
             [style.background-color]="action.style || null">
            <div><i class="bi me-2 ms-2 fs-5" [ngClass]="action.icon"></i><span class="fw-bold fs-6">{{ action.label }}</span></div>
            <i class="bi bi-chevron-left"></i>
          </a>
        </ng-container>
      </boc-glass-card>
    </div>
  </div>

  <div *ngIf="userRole === 'Admin'">
    <h4 class="fw-bold hero-title border-bottom pb-3 mb-4"><i class="bi bi-shield-lock text-danger me-2"></i>الإدارة الشاملة للنظام</h4>
    <div class="row g-4">
      <div class="col-md-3" *ngFor="let card of adminCards">
        <div class="glass-card p-4 h-100 hover-card">
          <i class="bi display-6 mb-3 d-block" [ngClass]="card.icon" [style.color]="card.color"></i>
          <h6 class="fw-bold">{{ card.title }}</h6>
          <a [routerLink]="card.route" class="text-decoration-none small fw-bold" [style.color]="card.color">{{ card.link }} <i class="bi bi-arrow-left"></i></a>
        </div>
      </div>
    </div>
  </div>
</div>
