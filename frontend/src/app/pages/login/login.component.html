<div class="login-wrapper d-flex min-vh-100" dir="rtl">
  <!-- Left Side: Login Form -->
  <div class="login-form-side d-flex flex-column justify-content-center align-items-center bg-white shadow-lg p-4 p-md-5">
    <div class="w-100" style="max-width: 400px;">
      <div class="text-center mb-5">
        <img src="assets/boc_logo.png" alt="BOC Logo" width="80" class="mb-3" onerror="this.style.display='none'">
        <h3 class="fw-bold text-dark">تسجيل الدخول</h3>
        <p class="text-muted">نظام إدارة وتقييم البحوث والدراسات</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger shadow-sm border-0 rounded-3 mb-4">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="mb-4">
          <label class="form-label fw-bold small text-muted">البريد الإلكتروني المؤسسي</label>
          <div class="input-group input-group-lg bg-light rounded-3 overflow-hidden">
            <span class="input-group-text bg-transparent border-0 text-primary"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control bg-transparent border-0 px-2" [(ngModel)]="credentials.email" name="email" required placeholder="name@boc.iq" dir="ltr">
          </div>
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label fw-bold small text-muted mb-0">كلمة المرور</label>
            <a routerLink="/auth/forgot-password" class="text-decoration-none small text-primary">نسيت كلمة المرور؟</a>
          </div>
          <div class="input-group input-group-lg bg-light rounded-3 overflow-hidden">
            <span class="input-group-text bg-transparent border-0 text-primary"><i class="bi bi-shield-lock"></i></span>
            <input type="password" class="form-control bg-transparent border-0 px-2" [(ngModel)]="credentials.password" name="password" required placeholder="••••••••" dir="ltr">
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm rounded-pill mb-4" [disabled]="!loginForm.form.valid || isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
          تسجيل الدخول
        </button>

        <div class="text-center text-muted small">
          ليس لديك حساب؟ <a routerLink="/auth/register" class="text-primary fw-bold text-decoration-none">إنشاء حساب باحث</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Right Side: Cinematic Image Background -->
  <div class="login-image-side d-none d-lg-block position-relative flex-grow-1">
    <img src="assets/boc_login_bg.png" alt="Oil Rig Background" class="w-100 h-100 object-fit-cover">
    <div class="position-absolute top-0 start-0 w-100 h-100" style="background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 10%);"></div>
  </div>
</div>
