<boc-auth-shell
  title="تسجيل الدخول"
  subtitle="نظام إدارة وتقييم البحوث والدراسات">

  <!-- Error Alert -->
  <div *ngIf="errorMessage" class="auth-alert auth-alert-error" role="alert">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span>{{ errorMessage }}</span>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

    <boc-form-field
      label="البريد الإلكتروني المؤسسي"
      type="email"
      icon="bi-envelope"
      placeholder="name@boc.iq"
      dir="ltr"
      formControlName="email">
    </boc-form-field>

    <div class="auth-label-row">
      <label class="form-label">كلمة المرور</label>
      <a routerLink="/auth/forgot-password" class="auth-link">نسيت كلمة المرور؟</a>
    </div>
    <boc-form-field
      label=""
      type="password"
      icon="bi-shield-lock"
      placeholder="••••••••"
      dir="ltr"
      formControlName="password">
    </boc-form-field>

    <button
      type="submit"
      class="btn btn-primary btn-lg w-100 mt-2"
      id="login-submit-btn"
      [disabled]="loginForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner"></span>
      <i *ngIf="!isLoading" class="bi bi-box-arrow-in-left"></i>
      {{ isLoading ? 'جارٍ الدخول...' : 'تسجيل الدخول' }}
    </button>

    <div class="auth-divider">
      <span>ليس لديك حساب؟</span>
    </div>

    <a routerLink="/auth/register" class="btn btn-secondary btn-lg w-100" id="register-link">
      <i class="bi bi-person-plus"></i>
      إنشاء حساب باحث
    </a>

  </form>
</boc-auth-shell>
