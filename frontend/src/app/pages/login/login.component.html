<boc-auth-shell title="تسجيل الدخول" subtitle="نظام إدارة وتقييم البحوث والدراسات">
  <div *ngIf="errorMessage" class="alert alert-danger shadow-sm border-0 rounded-3 mb-4" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <boc-form-field label="البريد الإلكتروني المؤسسي" type="email" icon="bi-envelope"
                    placeholder="name@boc.iq" dir="ltr" formControlName="email"></boc-form-field>

    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="small text-muted fw-bold">كلمة المرور</span>
      <a routerLink="/auth/forgot-password" class="text-decoration-none small text-primary">نسيت كلمة المرور؟</a>
    </div>
    <boc-form-field label="" type="password" icon="bi-shield-lock"
                    placeholder="••••••••" dir="ltr" formControlName="password"></boc-form-field>

    <button type="submit" class="btn btn-primary-industrial btn-lg w-100 mt-3 mb-4"
            [disabled]="loginForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
      تسجيل الدخول
    </button>

    <div class="text-center text-muted small">
      ليس لديك حساب؟
      <a routerLink="/auth/register" class="text-primary fw-bold text-decoration-none">إنشاء حساب باحث</a>
    </div>
  </form>
</boc-auth-shell>
