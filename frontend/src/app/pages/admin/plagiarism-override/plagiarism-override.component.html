<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="رفع حظر الانتحال العلمي"
      subtitle="مراجعة الأبحاث التي أوقفها النظام تلقائياً بسبب ارتفاع نسبة الاستلال."
      [breadcrumbs]="[{ label: 'الرئيسية', route: '/home' }, { label: 'تجاوز الانتحال' }]">
      <a heroActions routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-arrow-right me-1"></i> العودة للرئيسية
      </a>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <boc-stat-card label="أبحاث محظورة" [value]="lockedResearches.length" icon="bi-shield-exclamation"
                       iconBg="rgba(111, 66, 193, 0.12)" iconColor="var(--boc-accent-plagiarism)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="حد الاستلال المسموح" value="20%" icon="bi-percent"
                       iconBg="rgba(15, 42, 56, 0.1)" iconColor="var(--boc-primary)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="آخر مراجعة" value="اليوم" icon="bi-clock-history"
                       iconBg="rgba(74, 96, 122, 0.12)" iconColor="var(--boc-secondary)"></boc-stat-card>
      </div>
    </div>

    <boc-glass-card title="الأبحاث المحظورة" [noPadding]="true">
      <boc-empty-state *ngIf="lockedResearches.length === 0"
                       icon="bi-check-circle"
                       title="لا توجد أبحاث محظورة"
                       message="لا توجد أي أبحاث محظورة حالياً بسبب الانتحال.">
      </boc-empty-state>

      <div class="table-responsive admin-table" *ngIf="lockedResearches.length">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th class="ps-4 py-3">رقم البحث</th>
              <th class="py-3">عنوان البحث</th>
              <th class="py-3">الباحث</th>
              <th class="py-3">تاريخ الإيقاف</th>
              <th class="py-3">نسبة الاستلال</th>
              <th class="pe-4 py-3 text-end">الإجراءات</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let r of lockedResearches">
              <td class="ps-4 fw-bold text-muted">{{ r.id }}</td>
              <td>
                <div class="fw-bold">{{ r.title }}</div>
                <small class="text-danger"><i class="bi bi-robot me-1"></i> {{ r.systemNotes }}</small>
              </td>
              <td>{{ r.researcher }}</td>
              <td>{{ r.lockedDate | date:'yyyy/MM/dd' }}</td>
              <td>
                <span class="fw-bold text-danger score-value">{{ r.plagiarismScore }}%</span>
              </td>
              <td class="pe-4 text-end">
                <div class="btn-group">
                  <button type="button" class="btn btn-sm btn-outline-success rounded-pill" (click)="overrideLockout(r.id)" title="تجاوز النظام ورفع الحظر">
                    <i class="bi bi-unlock"></i> رفع الحظر استثنائياً
                  </button>
                  <button type="button" class="btn btn-sm btn-danger rounded-pill" (click)="rejectPermanently(r.id)" title="رفض نهائي">
                    <i class="bi bi-slash-circle"></i> رفض نهائي
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </boc-glass-card>
  </div>
</div>
