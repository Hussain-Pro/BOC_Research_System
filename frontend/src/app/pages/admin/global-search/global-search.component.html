<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <div class="page-header"><div><h1 class="text-h1">محرك البحث الشامل</h1><p class="text-label">ابحث عن أي بحث، مقيّم، باحث، أو محضر اجتماع في النظام.</p></div>
      <a heroActions routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-arrow-right me-1"></i> العودة للرئيسية
      </a>
    </div>

    <div class="mb-4">
    <div class="card mb-4"><div class="card-header"><span class="text-h3">بحث متقدم</span></div><div class="card-body">
      <div class="row g-3">
        <div class="col-md-8">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control" placeholder="اكتب رقم البحث، اسم الباحث، عنوان المحضر..."
                   [(ngModel)]="searchQuery" (keyup.enter)="performSearch()">
          </div>
        </div>
        <div class="col-md-4">
          <select class="form-select" [(ngModel)]="selectedFilter">
            <option value="all">جميع السجلات</option>
            <option value="research">الأبحاث فقط</option>
            <option value="evaluator">المقيمين (الرستر)</option>
            <option value="meeting">محاضر الاجتماعات</option>
          </select>
        </div>
      </div>
    </div></div>
    </div>

    <div class="card mb-4"><div class="card-body">
      <div class="empty-state" style="padding:40px"><div class="empty-icon"><i class="bi bi-info-circle"></i></div><h3>لا توجد بيانات</h3><p>البيانات المطلوبة غير متوفرة حالياً</p>
      </div>

      <div class="list-group list-group-flush" *ngIf="searchResults.length">
        <a href="javascript:void(0)" class="list-group-item list-group-item-action p-4 search-result-item"
           *ngFor="let res of searchResults">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="d-flex align-items-center gap-2 mb-2">
                <span class="badge type-badge" [ngClass]="getTypeBadgeClass(res.type)">
                  <i class="bi me-1" [ngClass]="getTypeIcon(res.type)"></i>
                  {{ getTypeLabel(res.type) }}
                </span>
                <span class="text-muted small">{{ res.id }}</span>
              </div>
              <h5 class="fw-bold mb-1">{{ res.title }}</h5>
              <small class="text-muted">تاريخ السجل: {{ res.date | date:'yyyy/MM/dd' }}</small>
            </div>
            <span class="badge bg-light text-dark border">{{ res.status }}</span>
          </div>
        </a>
      </div>
    </div></div>
  </div>
</div>
