<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <div class="page-header"><div><h1 class="text-h1">بوابة الوزارة</h1><p class="text-label">تصدير الأبحاث المقبولة نهائياً بمحاضر اللجنة وتوثيقها رسمياً لدى الوزارة.</p></div>
      <div heroActions class="d-flex gap-2 flex-wrap">
        <button type="button" class="btn btn-success btn-sm rounded-pill" [disabled]="isSending" (click)="sendNewBatch()">
          <span *ngIf="!isSending"><i class="bi bi-send-check me-1"></i> إرسال دفعة جديدة</span>
          <span *ngIf="isSending"><span class="spinner-border spinner-border-sm me-1"></span> جاري المزامنة...</span>
        </button>
        <a routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
          <i class="bi bi-arrow-right me-1"></i> العودة
        </a>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">إجمالي الدفعات</span></div><div class="kpi-value">{{ batches.length }}</div></div>
      </div>
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">تم الاستلام بنجاح</span></div><div class="kpi-value">{{ successCount }}</div></div>
      </div>
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">قيد المعالجة</span></div><div class="kpi-value">{{ pendingCount }}</div></div>
      </div>
    </div>

    <div class="card mb-4"><div class="card-header"><span class="text-h3">سجل الدفعات المرسلة</span></div><div class="card-body">
      <div class="empty-state" style="padding:40px"><div class="empty-icon"><i class="bi bi-info-circle"></i></div><h3>لا توجد بيانات</h3><p>البيانات المطلوبة غير متوفرة حالياً</p>
      </div>

      <boc-data-table *ngIf="batches.length"
                      [columns]="tableColumns"
                      [columnLabels]="columnLabels"
                      [data]="tableData">
      </boc-data-table>
    </div></div>
  </div>
</div>
