<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="بوابة الوزارة"
      subtitle="تصدير الأبحاث المقبولة نهائياً بمحاضر اللجنة وتوثيقها رسمياً لدى الوزارة."
      [breadcrumbs]="[{ label: 'الرئيسية', route: '/home' }, { label: 'بوابة الوزارة' }]">
      <div heroActions class="d-flex gap-2 flex-wrap">
        <button type="button" class="btn btn-success btn-sm rounded-pill" [disabled]="isSending" (click)="sendNewBatch()">
          <span *ngIf="!isSending"><i class="bi bi-send-check me-1"></i> إرسال دفعة جديدة</span>
          <span *ngIf="isSending"><span class="spinner-border spinner-border-sm me-1"></span> جاري المزامنة...</span>
        </button>
        <a routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
          <i class="bi bi-arrow-right me-1"></i> العودة
        </a>
      </div>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <boc-stat-card label="إجمالي الدفعات" [value]="batches.length" icon="bi-bank"
                       iconBg="rgba(25, 135, 84, 0.12)" iconColor="var(--boc-accent-ministry)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="تم الاستلام بنجاح" [value]="successCount" icon="bi-check-circle"
                       iconBg="rgba(40, 167, 69, 0.12)" iconColor="var(--boc-success)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="قيد المعالجة" [value]="pendingCount" icon="bi-hourglass-split"
                       iconBg="rgba(255, 193, 7, 0.15)" iconColor="var(--boc-warning)"></boc-stat-card>
      </div>
    </div>

    <boc-glass-card title="سجل الدفعات المرسلة" subtitle="Export History">
      <boc-empty-state *ngIf="batches.length === 0"
                       icon="bi-inbox"
                       title="لا توجد دفعات مرسلة"
                       message="لم يتم إرسال أي دفعة للوزارة بعد.">
      </boc-empty-state>

      <boc-data-table *ngIf="batches.length"
                      [columns]="tableColumns"
                      [columnLabels]="columnLabels"
                      [data]="tableData">
      </boc-data-table>
    </boc-glass-card>
  </div>
</div>
