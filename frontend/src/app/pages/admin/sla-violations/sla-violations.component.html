<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="لوحة الأبحاث المتأخرة"
      subtitle="مراقبة الأبحاث التي تجاوزت المدة القانونية للتقييم (10 أيام) واتخاذ الإجراءات اللازمة."
      [breadcrumbs]="[{ label: 'الرئيسية', route: '/home' }, { label: 'مخالفات SLA' }]">
      <a heroActions routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-arrow-right me-1"></i> العودة للرئيسية
      </a>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <boc-stat-card label="إجمالي المخالفات" [value]="violations.length" icon="bi-alarm"
                       iconBg="rgba(220, 53, 69, 0.12)" iconColor="var(--boc-danger)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="حالات حرجة" [value]="criticalCount" icon="bi-exclamation-triangle"
                       iconBg="rgba(220, 53, 69, 0.15)" iconColor="var(--boc-danger)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="مدة SLA القانونية" value="10 أيام" icon="bi-calendar-check"
                       iconBg="rgba(15, 42, 56, 0.1)" iconColor="var(--boc-primary)"></boc-stat-card>
      </div>
    </div>

    <boc-glass-card title="الأبحاث المتأخرة" [noPadding]="true">
      <boc-empty-state *ngIf="violations.length === 0"
                       icon="bi-shield-check"
                       title="لا توجد أبحاث متأخرة"
                       message="جميع اللجان ملتزمة بالـ SLA حالياً.">
      </boc-empty-state>

      <div class="table-responsive admin-table" *ngIf="violations.length">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th class="ps-4 py-3">رقم البحث</th>
              <th class="py-3">عنوان البحث</th>
              <th class="py-3">المقيّم</th>
              <th class="py-3">تاريخ الإسناد</th>
              <th class="py-3">مدة التأخير</th>
              <th class="pe-4 py-3 text-end">الإجراءات المتخذة</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let v of violations" [class.row-critical]="v.status === 'Critical'">
              <td class="ps-4 fw-bold">{{ v.researchId }}</td>
              <td>
                <div class="text-truncate title-cell" [title]="v.researchTitle">{{ v.researchTitle }}</div>
              </td>
              <td><i class="bi bi-person-badge me-1"></i> {{ v.evaluatorName }}</td>
              <td>{{ v.assignedDate | date:'yyyy/MM/dd' }}</td>
              <td>
                <span class="badge" [ngClass]="v.status === 'Critical' ? 'bg-danger' : 'bg-warning text-dark'">
                  متأخر {{ v.delayDays }} أيام
                </span>
              </td>
              <td class="pe-4 text-end">
                <div class="btn-group">
                  <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill" (click)="sendReminder(v.evaluatorName)" title="إرسال تذكير عاجل">
                    <i class="bi bi-envelope-exclamation"></i> تذكير
                  </button>
                  <button type="button" class="btn btn-sm btn-danger rounded-pill" (click)="reassignEvaluation(v.researchId)" title="سحب البحث وإعادة تعيينه">
                    <i class="bi bi-arrow-left-right"></i> سحب وإعادة تعيين
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </boc-glass-card>
  </div>
</div>
