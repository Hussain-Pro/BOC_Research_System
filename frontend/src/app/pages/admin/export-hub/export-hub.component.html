<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="مركز تصدير التقارير"
      subtitle="استخراج تقارير الأداء، الكشوفات المالية، وسجلات الأبحاث بصيغ متعددة."
      [breadcrumbs]="[{ label: 'الرئيسية', route: '/home' }, { label: 'مركز التصدير' }]">
      <a heroActions routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-arrow-right me-1"></i> العودة للرئيسية
      </a>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <boc-stat-card label="تقرير مُستخرج (العام الحالي)" value="1,245" icon="bi-cloud-download"
                       iconBg="rgba(253, 126, 20, 0.12)" iconColor="var(--boc-accent-export)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="قوالب تقارير جاهزة" value="15" icon="bi-file-earmark-check"
                       iconBg="rgba(40, 167, 69, 0.12)" iconColor="var(--boc-success)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="تقرير مُرسل للإدارة العليا" value="54" icon="bi-envelope-paper"
                       iconBg="rgba(255, 193, 7, 0.15)" iconColor="var(--boc-warning)"></boc-stat-card>
      </div>
    </div>

    <boc-glass-card title="القوالب الأكثر استخداماً" subtitle="اختر قالباً لتصديره فوراً">
      <div class="row g-4">
        <div class="col-md-6 col-lg-3" *ngFor="let report of reports">
          <div class="report-card glass-card p-4 h-100 d-flex flex-column">
            <div class="text-center flex-grow-1">
              <i class="bi report-icon mb-3 d-block" [ngClass]="[report.icon, report.colorClass]"></i>
              <h6 class="fw-bold mb-2">{{ report.title }}</h6>
              <span class="badge bg-light text-dark border">صيغة: {{ report.type }}</span>
            </div>
            <button type="button" class="btn btn-outline-secondary w-100 mt-3 rounded-pill"
                    [disabled]="isExporting" (click)="generateReport(report)">
              <i class="bi bi-download me-1"></i> تصدير الآن
            </button>
          </div>
        </div>
      </div>
    </boc-glass-card>
  </div>
</div>
