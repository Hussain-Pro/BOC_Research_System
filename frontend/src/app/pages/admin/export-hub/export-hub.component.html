<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <div class="page-header"><div><h1 class="text-h1">مركز تصدير التقارير</h1><p class="text-label">استخراج تقارير الأداء، الكشوفات المالية، وسجلات الأبحاث بصيغ متعددة.</p></div>
      <a heroActions routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-arrow-right me-1"></i> العودة للرئيسية
      </a>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">تقرير مُستخرج (العام الحالي)</span></div><div class="kpi-value">1,245</div></div>
      </div>
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">قوالب تقارير جاهزة</span></div><div class="kpi-value">15</div></div>
      </div>
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">تقرير مُرسل للإدارة العليا</span></div><div class="kpi-value">54</div></div>
      </div>
    </div>

    <div class="card mb-4"><div class="card-header"><span class="text-h3">القوالب الأكثر استخداماً</span></div><div class="card-body">
      <div class="row g-4">
        <div class="col-md-6 col-lg-3" *ngFor="let report of reports">
          <div class="report-card glass-card p-4 h-100 d-flex flex-column">
            <div class="text-center flex-grow-1">
              <i class="bi report-icon mb-3 d-block" [ngClass]="[report.icon, report.colorClass]"></i>
              <h6 class="fw-bold mb-2">{{ report.title }}</h6>
              <span class="badge bg-light text-dark border">صيغة: {{ report.type }}</span>
            </div>
            <button type="button" class="btn btn-outline-secondary w-100 mt-3 rounded-pill"
                    [disabled]="isExporting" (click)="generateReport(report)">
              <i class="bi bi-download me-1"></i> تصدير الآن
            </button>
          </div>
        </div>
      </div>
    </div></div>
  </div>
</div>
