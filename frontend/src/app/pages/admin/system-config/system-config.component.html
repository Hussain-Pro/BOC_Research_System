<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="إعدادات النظام"
      subtitle="تكوين محددات النظام (SLA) والقوائم المنسدلة للأقسام العلمية والتخصصات."
      [breadcrumbs]="[{ label: 'الرئيسية', route: '/home' }, { label: 'إعدادات النظام' }]">
      <button heroActions type="button" class="btn btn-primary-industrial btn-sm rounded-pill">
        <i class="bi bi-save me-1"></i> حفظ التغييرات
      </button>
    </boc-page-hero>

    <div class="row g-4">
      <div class="col-md-5">
        <boc-glass-card title="متغيرات SLA الأساسية">
          <div class="mb-4">
            <label class="form-label fw-bold">الحد الأقصى لتقييم البحث (أيام)</label>
            <input type="number" class="form-control" [value]="slaDays">
            <small class="text-muted">المدة الممنوحة للمقيم قبل تسجيل مخالفة SLA.</small>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">أيام التنبيه المبكر (Warning)</label>
            <input type="number" class="form-control" [value]="warningDays">
            <small class="text-muted">عدد الأيام المتبقية لبدء إرسال إيميلات تذكيرية.</small>
          </div>

          <div class="mb-0">
            <label class="form-label fw-bold">فترة الاحتفاظ بالملفات المؤقتة (ساعات)</label>
            <input type="number" class="form-control" [value]="tempRetention">
          </div>
        </boc-glass-card>
      </div>

      <div class="col-md-7">
        <boc-glass-card title="إدارة قوائم النظام (Dictionaries)">
          <ul class="nav nav-pills mb-4 config-tabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" type="button">أقسام BOC المتخصصة</button>
            </li>
            <li class="nav-item ms-2" role="presentation">
              <button class="nav-link" type="button">معايير التقييم وأوزانها</button>
            </li>
          </ul>

          <div class="table-responsive admin-table">
            <table class="table table-hover align-middle mb-0">
              <tbody>
                <tr *ngFor="let dept of departments">
                  <td class="w-100">
                    <input type="text" class="form-control" [value]="dept.name">
                  </td>
                  <td class="text-end pe-0">
                    <button type="button" class="btn btn-outline-danger btn-sm" title="حذف">
                      <i class="bi bi-trash"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <button type="button" class="btn btn-outline-primary mt-3 rounded-pill">
            <i class="bi bi-plus-circle me-1"></i> إضافة قسم جديد
          </button>
        </boc-glass-card>
      </div>
    </div>
  </div>
</div>
