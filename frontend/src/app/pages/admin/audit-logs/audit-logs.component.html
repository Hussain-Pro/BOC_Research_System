<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <div class="page-header"><div><h1 class="text-h1">سجل التدقيق الأمني</h1><p class="text-label">سجل شامل يعرض كل حركة وتغيير تم في النظام.</p></div>
      <button heroActions type="button" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-download me-1"></i> تصدير السجل (CSV)
      </button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">إجمالي السجلات</span></div><div class="kpi-value">{{ logs.length }}</div></div>
      </div>
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">عمليات التعديل</span></div><div class="kpi-value">{{ 1 }}</div></div>
      </div>
      <div class="col-md-4">
        <div class="kpi-card"><div class="kpi-header"><span class="text-upper-label">تسجيلات الدخول</span></div><div class="kpi-value">{{ 1 }}</div></div>
      </div>
    </div>

    <div class="card mb-4"><div class="card-header"><span class="text-h3">سجل الأحداث</span></div><div class="card-body">
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <input type="date" class="form-control">
        </div>
        <div class="col-md-4">
          <select class="form-select">
            <option selected>تصفية حسب نوع الإجراء...</option>
            <option>تسجيل دخول</option>
            <option>تعديل تقييم</option>
            <option>حذف مستند</option>
          </select>
        </div>
        <div class="col-md-4">
          <button type="button" class="btn btn-primary-industrial w-100">تطبيق الفلاتر</button>
        </div>
      </div>

      <boc-data-table
        [columns]="tableColumns"
        [columnLabels]="columnLabels"
        [data]="logs">
      </boc-data-table>
    </div></div>
  </div>
</div>
