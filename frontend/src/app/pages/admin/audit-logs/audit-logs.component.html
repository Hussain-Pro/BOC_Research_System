<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="سجل التدقيق الأمني"
      subtitle="سجل شامل يعرض كل حركة وتغيير تم في النظام."
      [breadcrumbs]="[{ label: 'الرئيسية', route: '/home' }, { label: 'سجل التدقيق' }]">
      <button heroActions type="button" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-download me-1"></i> تصدير السجل (CSV)
      </button>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <boc-stat-card label="إجمالي السجلات" [value]="logs.length" icon="bi-journal-text"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="عمليات التعديل" [value]="1" icon="bi-pencil-square"
                       iconBg="rgba(255, 193, 7, 0.15)" iconColor="var(--boc-warning)"></boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card label="تسجيلات الدخول" [value]="1" icon="bi-box-arrow-in-left"
                       iconBg="rgba(23, 162, 184, 0.12)" iconColor="var(--boc-info)"></boc-stat-card>
      </div>
    </div>

    <boc-glass-card title="سجل الأحداث">
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <input type="date" class="form-control">
        </div>
        <div class="col-md-4">
          <select class="form-select">
            <option selected>تصفية حسب نوع الإجراء...</option>
            <option>تسجيل دخول</option>
            <option>تعديل تقييم</option>
            <option>حذف مستند</option>
          </select>
        </div>
        <div class="col-md-4">
          <button type="button" class="btn btn-primary-industrial w-100">تطبيق الفلاتر</button>
        </div>
      </div>

      <boc-data-table
        [columns]="tableColumns"
        [columnLabels]="columnLabels"
        [data]="logs">
      </boc-data-table>
    </boc-glass-card>
  </div>
</div>
