<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="لوحة البيانات التنفيذية"
      subtitle="إحصائيات متقدمة تعكس واقع إنجاز الدراسات والبحوث."
      [breadcrumbs]="[{ label: 'الرئيسية', route: '/home' }, { label: 'التحليلات' }]">
      <a heroActions routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-arrow-right me-1"></i> العودة للرئيسية
      </a>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <boc-stat-card label="إجمالي البحوث المستلمة" [value]="metrics.totalReceived" icon="bi-inbox"></boc-stat-card>
      </div>
      <div class="col-md-3">
        <boc-stat-card label="قيد التقييم" [value]="metrics.underEvaluation" icon="bi-hourglass-split"
                       iconBg="rgba(255, 193, 7, 0.15)" iconColor="var(--boc-warning)"></boc-stat-card>
      </div>
      <div class="col-md-3">
        <boc-stat-card label="مكتملة ومُصدقة" [value]="metrics.completed" icon="bi-check-circle"
                       iconBg="rgba(40, 167, 69, 0.12)" iconColor="var(--boc-success)"></boc-stat-card>
      </div>
      <div class="col-md-3">
        <boc-stat-card label="مخالفات المدة (SLA)" [value]="metrics.slaBreaches" icon="bi-alarm"
                       iconBg="rgba(220, 53, 69, 0.12)" iconColor="var(--boc-danger)"></boc-stat-card>
      </div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-8">
        <boc-glass-card title="معدل إنجاز البحوث">
          <apx-chart
            [series]="areaChartOptions.series"
            [chart]="areaChartOptions.chart"
            [xaxis]="areaChartOptions.xaxis"
            [dataLabels]="areaChartOptions.dataLabels"
            [grid]="areaChartOptions.grid"
            [stroke]="areaChartOptions.stroke"
            [title]="areaChartOptions.title"
            [colors]="areaChartOptions.colors">
          </apx-chart>
        </boc-glass-card>
      </div>
      <div class="col-md-4">
        <boc-glass-card title="حالة البحوث الكلية">
          <apx-chart
            [series]="donutChartOptions.series"
            [chart]="donutChartOptions.chart"
            [labels]="donutChartOptions.labels"
            [dataLabels]="donutChartOptions.dataLabels"
            [title]="donutChartOptions.title"
            [colors]="donutChartOptions.colors">
          </apx-chart>
        </boc-glass-card>
      </div>
    </div>

    <boc-glass-card title="أحدث المحاضر المنجزة" subtitle="آخر التقارير المعتمدة من اللجان">
      <div class="d-flex justify-content-end mb-3">
        <button type="button" class="btn btn-sm btn-outline-primary rounded-pill">
          <i class="bi bi-file-earmark-excel me-1"></i> تصدير التقرير
        </button>
      </div>
      <boc-data-table
        [columns]="reportColumns"
        [columnLabels]="reportColumnLabels"
        [data]="recentReports">
      </boc-data-table>
    </boc-glass-card>
  </div>
</div>
