<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light" dir="rtl">
  <div class="row w-100 justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card-industrial p-4 text-center">
        <h3 class="mb-4" style="color: var(--boc-primary); font-weight: 700;">
          تعيين كلمة مرور جديدة
        </h3>
        
        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
          
          <div class="mb-3 text-end">
            <label for="email" class="form-label">البريد الإلكتروني</label>
            <input type="email" class="form-control" id="email" formControlName="email" required dir="ltr">
          </div>

          <div class="mb-3 text-end">
            <label for="token" class="form-label">رمز الاستعادة (Token)</label>
            <input type="text" class="form-control" id="token" formControlName="token" required dir="ltr">
          </div>
          
          <div class="mb-4 text-end">
            <label for="newPassword" class="form-label">كلمة المرور الجديدة</label>
            <input type="password" class="form-control" id="newPassword" formControlName="newPassword" required dir="ltr">
          </div>
          
          <button type="submit" class="btn btn-primary-industrial w-100 mb-3" [disabled]="resetForm.invalid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            تحديث كلمة المرور
          </button>
        </form>
        
        <div class="mt-2 text-center">
          <a routerLink="/auth/login" class="text-decoration-none text-muted small">العودة لتسجيل الدخول</a>
        </div>
      </div>
    </div>
  </div>
</div>
