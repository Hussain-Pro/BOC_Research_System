<boc-auth-shell
  title="إعادة تعيين كلمة المرور"
  subtitle="أدخل كلمة المرور الجديدة وتأكيدها">

  <!-- Success State -->
  <div *ngIf="isSuccess" class="auth-success-state">
    <div class="success-icon">
      <i class="bi bi-check-circle-fill"></i>
    </div>
    <h3>تم تعيين كلمة المرور</h3>
    <p>تم إعادة تعيين كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة.</p>
    <a routerLink="/auth/login" class="btn btn-primary btn-md" id="go-to-login-btn">
      <i class="bi bi-box-arrow-in-left"></i>
      تسجيل الدخول الآن
    </a>
  </div>

  <!-- Form -->
  <ng-container *ngIf="!isSuccess">
    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="auth-alert auth-alert-error" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" novalidate>

      <boc-form-field
        label="كلمة المرور الجديدة"
        type="password"
        icon="bi-lock"
        placeholder="••••••••"
        dir="ltr"
        formControlName="newPassword"
        hint="6 أحرف على الأقل"
        [required]="true">
      </boc-form-field>

      <boc-form-field
        label="تأكيد كلمة المرور"
        type="password"
        icon="bi-lock-fill"
        placeholder="••••••••"
        dir="ltr"
        formControlName="confirmPassword"
        [required]="true">
      </boc-form-field>

      <button
        type="submit"
        class="btn btn-primary btn-lg w-100 mt-2"
        id="reset-password-submit-btn"
        [disabled]="resetPasswordForm.invalid || isLoading">
        <span *ngIf="isLoading" class="spinner"></span>
        <i *ngIf="!isLoading" class="bi bi-shield-check"></i>
        {{ isLoading ? 'جارٍ التعيين...' : 'تعيين كلمة المرور' }}
      </button>

    </form>
  </ng-container>

</boc-auth-shell>
