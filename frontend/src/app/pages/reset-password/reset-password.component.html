<boc-auth-shell title="إعادة تعيين كلمة المرور" subtitle="أدخل كلمة المرور الجديدة لحسابك">
  <div *ngIf="message" class="alert alert-success shadow-sm border-0 rounded-3 mb-4" role="status">
    <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
  </div>
  <div *ngIf="errorMessage" class="alert alert-danger shadow-sm border-0 rounded-3 mb-4" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
  </div>

  <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" *ngIf="!isSuccess">
    <boc-form-field label="كلمة المرور الجديدة" type="password" icon="bi-shield-lock"
                    placeholder="••••••••" dir="ltr" formControlName="newPassword"></boc-form-field>

    <boc-form-field label="تأكيد كلمة المرور" type="password" icon="bi-shield-check"
                    placeholder="••••••••" dir="ltr" formControlName="confirmPassword"></boc-form-field>

    <button type="submit" class="btn btn-primary-industrial btn-lg w-100 mt-3 mb-4"
            [disabled]="resetPasswordForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
      إعادة التعيين
    </button>
  </form>

  <div class="text-center" *ngIf="isSuccess">
    <a routerLink="/auth/login" class="btn btn-primary-industrial btn-lg px-5">العودة لتسجيل الدخول</a>
  </div>
</boc-auth-shell>
