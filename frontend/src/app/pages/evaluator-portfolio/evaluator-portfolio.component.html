<div class="container-fluid dashboard-bg min-vh-100 py-4" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="السجل التاريخي للمقيّم"
      subtitle="سجل بجميع الأبحاث التي قمت بتقييمها، مع مؤشرات الأداء الخاصة بك."
      [breadcrumbs]="breadcrumbs">
      <a heroActions routerLink="/committee/workspace" class="btn btn-primary-industrial btn-sm">
        <i class="bi bi-clipboard-check me-2"></i> العودة لمساحة العمل
      </a>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <boc-stat-card
          label="إجمالي الأبحاث المقيمة"
          [value]="kpis.totalEvaluated"
          icon="bi-journal-check"
          iconBg="rgba(132, 48, 206, 0.12)"
          iconColor="var(--boc-accent-evaluator)">
        </boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card
          label="نسبة الالتزام بوقت التقييم (SLA)"
          [value]="kpis.onTimePercentage + '%'"
          icon="bi-clock-history"
          iconBg="rgba(40, 167, 69, 0.12)"
          iconColor="var(--boc-success)"
          trend="أداء ممتاز"
          [trendUp]="true">
        </boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card
          label="متوسط الدرجات الممنوحة"
          [value]="kpis.averageScoreGiven"
          icon="bi-bar-chart"
          iconBg="rgba(15, 42, 56, 0.1)"
          iconColor="var(--boc-primary)">
        </boc-stat-card>
      </div>
    </div>

    <boc-glass-card title="قائمة الأبحاث المقيمة سابقاً" subtitle="سجل كامل لتقييماتك السابقة وقرارات اللجنة">
      <boc-empty-state
        *ngIf="portfolioRecords.length === 0"
        icon="bi-inbox"
        title="لا توجد سجلات"
        message="لم تقم بتقييم أي بحث بعد.">
      </boc-empty-state>

      <boc-data-table
        *ngIf="portfolioRecords.length"
        [columns]="tableColumns"
        [columnLabels]="tableLabels"
        [data]="tableData"
        [pageSize]="10">
      </boc-data-table>
    </boc-glass-card>
  </div>
</div>
