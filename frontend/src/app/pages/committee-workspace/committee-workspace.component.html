<div class="container-fluid dashboard-bg min-vh-100 py-4 workspace-page" dir="rtl">
  <div class="container">
    <boc-page-hero
      title="مساحة عمل اللجان والتقييم"
      subtitle="مراجعة الأبحاث المسندة وإدخال التقييمات الفنية."
      [breadcrumbs]="breadcrumbs">
      <a heroActions routerLink="/home" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="bi bi-house me-1"></i> العودة للرئيسية
      </a>
    </boc-page-hero>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <boc-stat-card
          label="المهام النشطة"
          [value]="assignments.length"
          icon="bi-clipboard-check"
          iconBg="rgba(132, 48, 206, 0.12)"
          iconColor="var(--boc-accent-evaluator)">
        </boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card
          label="المهمة المحددة"
          [value]="selectedAssignment ? 1 : 0"
          icon="bi-file-earmark-text"
          iconBg="rgba(15, 42, 56, 0.1)"
          iconColor="var(--boc-primary)">
        </boc-stat-card>
      </div>
      <div class="col-md-4">
        <boc-stat-card
          label="تكبير العرض"
          [value]="zoomLabel"
          icon="bi-zoom-in"
          iconBg="rgba(13, 110, 253, 0.12)"
          iconColor="var(--boc-accent-committee)">
        </boc-stat-card>
      </div>
    </div>

    <div class="row g-4 workspace-grid">
      <div class="col-lg-3">
        <boc-glass-card [title]="'قائمة المهام (' + assignments.length + ')'" [noPadding]="true">
          <boc-empty-state
            *ngIf="assignments.length === 0"
            icon="bi-check2-circle"
            title="لا توجد مهام"
            message="لا توجد أبحاث مسندة إليك حالياً. أحسنت!">
          </boc-empty-state>

          <div class="list-group list-group-flush" *ngIf="assignments.length">
            <button
              *ngFor="let assign of assignments"
              type="button"
              class="list-group-item list-group-item-action p-3 border-bottom assignment-item"
              [class.active-assignment]="selectedAssignment?.id === assign.id"
              (click)="selectAssignment(assign)">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="badge bg-secondary">{{ assign.researchId }}</span>
                <span class="badge bg-danger" *ngIf="getDaysRemaining(assign.dueDate) <= 3">
                  متبقي {{ getDaysRemaining(assign.dueDate) }} أيام!
                </span>
                <span class="badge bg-primary" *ngIf="getDaysRemaining(assign.dueDate) > 3">
                  متبقي {{ getDaysRemaining(assign.dueDate) }} يوم
                </span>
              </div>
              <h6 class="fw-bold mb-1 lh-base">{{ assign.title }}</h6>
              <small class="text-muted d-block">
                <i class="bi bi-calendar-event me-1"></i> تاريخ الإسناد: {{ assign.assignedDate | date:'yyyy/MM/dd' }}
              </small>
            </button>
          </div>
        </boc-glass-card>
      </div>

      <div class="col-lg-9" *ngIf="selectedAssignment">
        <div class="row g-4 h-100">
          <div class="col-xl-8">
            <boc-glass-card title="مستعرض الملفات المشفر" [noPadding]="true" extraClass="viewer-card">
              <div class="viewer-toolbar">
                <div class="btn-group">
                  <button type="button" class="btn btn-sm btn-outline-secondary" (click)="zoomIn()" title="تكبير"><i class="bi bi-zoom-in"></i></button>
                  <button type="button" class="btn btn-sm btn-outline-secondary" (click)="zoomOut()" title="تصغير"><i class="bi bi-zoom-out"></i></button>
                </div>
                <button type="button" class="btn btn-sm btn-outline-primary rounded-pill" (click)="downloadPdf()">
                  <i class="bi bi-download me-1"></i> تنزيل الملف
                </button>
              </div>
              <div class="pdf-viewer-area">
                <pdf-viewer
                  [src]="pdfSrc"
                  [render-text]="true"
                  [original-size]="false"
                  [zoom]="zoom"
                  style="width: 100%; height: 100%; display: block;"
                  (after-load-complete)="pdfLoading = false">
                </pdf-viewer>
                <div class="pdf-loading" *ngIf="pdfLoading">
                  <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                </div>
              </div>
            </boc-glass-card>
          </div>

          <div class="col-xl-4">
            <boc-glass-card title="نموذج التقييم الفني">
              <div class="glass-card p-3 mb-4 meta-snippet">
                <h6 class="fw-bold text-dark">{{ selectedAssignment.title }}</h6>
                <hr>
                <p class="mb-0 small text-muted">الحد الأقصى للتسليم: {{ selectedAssignment.dueDate | date:'yyyy/MM/dd' }}</p>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold">الدرجة الممنوحة (من 100) <span class="text-danger">*</span></label>
                <div class="input-group input-group-lg">
                  <input type="number" class="form-control text-center fs-3 fw-bold" [(ngModel)]="evaluationScore" min="0" max="100" placeholder="0 - 100">
                  <span class="input-group-text bg-light text-muted">%</span>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold">التقرير الفني (المبررات) <span class="text-danger">*</span></label>
                <textarea class="form-control" rows="8" [(ngModel)]="evaluationComments" placeholder="اكتب الملاحظات الفنية والمبررات للدرجة الممنوحة هنا..."></textarea>
                <div class="form-text">الحد الأدنى 20 حرف. سيعرض التقرير أمام اللجنة في محضر الاجتماع.</div>
              </div>

              <button type="button" class="btn btn-primary-industrial w-100 btn-lg" [disabled]="isSubmitting" (click)="submitEvaluation()">
                <span *ngIf="!isSubmitting"><i class="bi bi-shield-check me-2"></i> اعتماد وإرسال التقييم</span>
                <span *ngIf="isSubmitting"><span class="spinner-border spinner-border-sm me-2"></span> جاري الإرسال...</span>
              </button>
            </boc-glass-card>
          </div>
        </div>
      </div>

      <div class="col-lg-9" *ngIf="!selectedAssignment">
        <boc-glass-card>
          <boc-empty-state
            icon="bi-folder2-open"
            title="اختر مهمة للتقييم"
            message="يرجى اختيار بحث من القائمة الجانبية للبدء بالتقييم.">
          </boc-empty-state>
        </boc-glass-card>
      </div>
    </div>
  </div>
</div>
