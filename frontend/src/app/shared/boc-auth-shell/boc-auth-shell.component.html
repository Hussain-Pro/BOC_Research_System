<!-- Enterprise Auth Shell — Split Screen Layout -->
<div class="auth-shell" [attr.dir]="'rtl'">

  <!-- Left: Brand Panel (Visual) -->
  <div class="auth-brand-panel" *ngIf="showVisual">
    <div class="auth-brand-content">
      <div class="auth-brand-logo">
        <i class="bi bi-bank"></i>
      </div>
      <h1 class="auth-brand-title">نظام أبحاث البنك</h1>
      <p class="auth-brand-sub">شركة نفط البصرة — منصة التقييم البحثي</p>

      <div class="auth-brand-stats">
        <div class="auth-stat">
          <span class="auth-stat-value">128+</span>
          <span class="auth-stat-label">بحثاً مُقيَّماً</span>
        </div>
        <div class="auth-stat">
          <span class="auth-stat-value">86%</span>
          <span class="auth-stat-label">نسبة الموافقة</span>
        </div>
        <div class="auth-stat">
          <span class="auth-stat-value">24</span>
          <span class="auth-stat-label">قيد التقييم</span>
        </div>
      </div>

      <div class="auth-brand-badge">
        <i class="bi bi-shield-fill-check"></i>
        <span>نظام آمن ومشفّر — ISO 27001</span>
      </div>
    </div>

    <!-- Geometric decorations -->
    <div class="auth-brand-decor decor-1"></div>
    <div class="auth-brand-decor decor-2"></div>
    <div class="auth-brand-decor decor-3"></div>
  </div>

  <!-- Right: Form Panel -->
  <div class="auth-form-panel">
    <div class="auth-form-inner" [style.max-width]="maxWidth">

      <!-- Mobile logo (only if no visual panel) -->
      <div class="auth-mobile-logo d-lg-none" *ngIf="!showVisual">
        <div class="auth-logo-mark"><i class="bi bi-bank"></i></div>
      </div>

      <!-- Header -->
      <div class="auth-form-header">
        <div class="auth-logo-mark d-none d-lg-flex">
          <i class="bi bi-bank"></i>
        </div>
        <div>
          <h2 class="auth-form-title">{{ title }}</h2>
          <p class="auth-form-subtitle" *ngIf="subtitle">{{ subtitle }}</p>
        </div>
      </div>

      <!-- Slot for page content -->
      <ng-content></ng-content>
    </div>

    <!-- Footer -->
    <div class="auth-form-footer">
      <span>نظام إدارة البحوث © {{ year }} — شركة نفط البصرة</span>
    </div>
  </div>
</div>
