<div class="page-hero d-flex flex-wrap justify-content-between align-items-center gap-3">
  <div>
    <nav *ngIf="breadcrumbs.length" aria-label="breadcrumb" class="mb-2">
      <ol class="breadcrumb mb-0 small">
        <li class="breadcrumb-item" *ngFor="let crumb of breadcrumbs; let last = last" [class.active]="last">
          <a *ngIf="crumb.route && !last" [routerLink]="crumb.route">{{ crumb.label }}</a>
          <span *ngIf="!crumb.route || last">{{ crumb.label }}</span>
        </li>
      </ol>
    </nav>
    <h2 class="fw-bold mb-1 hero-title">{{ title }}</h2>
    <p class="text-muted mb-0" *ngIf="subtitle">{{ subtitle }}</p>
  </div>
  <div class="hero-actions">
    <ng-content select="[heroActions]"></ng-content>
  </div>
</div>
