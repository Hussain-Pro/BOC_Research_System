<div class="stat-card h-100">
  <div class="d-flex justify-content-between align-items-start">
    <div>
      <p class="text-muted small mb-1">{{ label }}</p>
      <h3 class="fw-bold mb-0 stat-value">{{ value }}</h3>
      <span *ngIf="trend" class="small mt-2 d-inline-block"
            [class.text-success]="trendUp" [class.text-danger]="!trendUp">
        <i class="bi" [class.bi-arrow-up]="trendUp" [class.bi-arrow-down]="!trendUp"></i>
        {{ trend }}
      </span>
    </div>
    <div class="stat-icon" [style.background]="iconBg" [style.color]="iconColor">
      <i class="bi" [ngClass]="icon"></i>
    </div>
  </div>
</div>
