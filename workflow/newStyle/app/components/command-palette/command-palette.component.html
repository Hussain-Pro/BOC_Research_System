<!-- Command Palette Overlay -->
<div class="cmd-overlay" [class.active]="isOpen" (click)="closeOnBackdrop($event)">
  <div class="cmd-palette" (click)="$event.stopPropagation()">
    <div class="cmd-input-wrap">
      <i class="bi bi-search"></i>
      <input
        type="text"
        class="cmd-input"
        [placeholder]="'CMD_PALETTE.PLACEHOLDER' | translate"
        [(ngModel)]="query"
        (input)="onSearch()"
        (keydown)="onKeydown($event)"
        #cmdInput
      >
      <kbd>ESC</kbd>
    </div>
    <div class="cmd-results" *ngIf="results.length > 0">
      <div class="cmd-group" *ngFor="let group of results">
        <div class="cmd-group-header">{{ group.title | translate }}</div>
        <div
          *ngFor="let item of group.items; let i = index"
          class="cmd-item"
          [class.selected]="isSelected(group, i)"
          (click)="execute(item)"
          (mouseenter)="selectItem(group, i)"
        >
          <i [class]="item.icon"></i>
          <div>
            <div class="cmd-item-title">{{ item.title }}</div>
            <div class="cmd-item-sub">{{ item.subtitle }}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="cmd-empty" *ngIf="query && results.length === 0">
      <div class="empty-state" style="padding: var(--space-6)">
        <i class="bi bi-search"></i>
        <h3 class="text-h3">{{ 'CMD_PALETTE.NO_RESULTS' | translate }}</h3>
        <p class="text-body text-secondary">{{ 'CMD_PALETTE.TRY_DIFFERENT' | translate }}</p>
      </div>
    </div>
  </div>
</div>
